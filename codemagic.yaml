workflows:
  android-build:
    name: Build APK via Codemagic
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: 1. Generate Struktur Project
        script: flutter create --org com.kommunitas --project-name app my_app

      - name: 2. Masukkan Kode & Download Logo
        script: |
          cp main.dart my_app/lib/main.dart
          cd my_app
          wget -O logo.png "https://kommunitas.web.id/logo.png"

      - name: 3. Install Package Webview, Icon, dan Splash
        script: |
          cd my_app
          flutter pub add webview_flutter
          flutter pub add --dev flutter_launcher_icons
          flutter pub add --dev flutter_native_splash

      - name: 4. Eksekusi Pemasangan Icon & Splash Screen
        script: |
          cd my_app
          cat <<EOF >> pubspec.yaml
          
          flutter_icons:
            android: true
            ios: false
            image_path: "logo.png"

          flutter_native_splash:
            color: "#121212"
            image: "logo.png"
            android_12:
              image: "logo.png"
              color: "#121212"
          EOF
          
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: 5. Ubah Nama Aplikasi & Beri Izin Internet
        script: |
          cd my_app
          # Menggunakan perl agar berjalan lancar di mesin Mac
          perl -pi -e 's/android:label="app"/android:label="Kommunitas"/g' android/app/src/main/AndroidManifest.xml
          perl -pi -e 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml

      - name: 6. Build (Compile) jadi APK
        script: |
          cd my_app
          flutter build apk --release
          
    artifacts:
      - my_app/build/app/outputs/flutter-apk/app-release.apk
            android_12:
              image: "logo.png"
              color: "#121212"
          EOF
          
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: 5. Ubah Nama Aplikasi & Beri Izin Internet
        script: |
          cd my_app
          sed -i 's/android:label="app"/android:label="Kommunitas"/g' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: 6. Build (Compile) jadi APK
        script: |
          cd my_app
          flutter build apk --release
          
    artifacts:
      - my_app/build/app/outputs/flutter-apk/app-release.apk
